name: CI Quality & Security

on:
  push:
    branches: [ main, dev, master ]

  pull_request:
    branches: [master]

jobs:
  # 1. SÉCURITÉ
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. QUALITÉ (LINT + TESTS)
  test-and-lint:
    name: Quality and Tests
    needs: security-scan
    runs-on: ubuntu-latest
    
    # Ajout du service MinIO pour simuler le stockage S3
    services:
      minio:
        image: minio/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: password
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      args: server /data

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12

      - name: Run tests
        env:
          TESTING: True
          PYTHONPATH: .
          # Variables indispensables pour éviter les KeyError et erreurs de connexion
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: admin
          AWS_SECRET_ACCESS_KEY: password
          MLFLOW_TRACKING_URI: http://localhost:5000 
        run: |
          # On crée un dossier bidon pour MLflow si le serveur n'est pas lancé
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          uv run pytest --cov=fastapi_api --cov=streamlit_front .

    

  # 3. DOCUMENTATION
  documentation-check:
    name: Documentation Build

    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build HTML Documentation
        run: |
          # S'assure que le dossier de sortie existe
          mkdir -p build/html
          
          uv run sphinx-build -b html docs/source/ build/html
