name: CI Quality & Security

on:
  push:
    branches: [ main, dev, master ]
  pull_request:
    branches: [ master ]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-and-lint:
      name: Quality and Tests
      needs: security-scan
      runs-on: ubuntu-latest
      
      services:
        minio:
          # On utilise une version taguée pour éviter l'erreur de manifest
          image: minio/minio:RELEASE.2024-01-31T20-20-33Z
          ports:
            - 9000:9000
          env:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: password
          # CRUCIAL : GitHub injecte cela AVANT le nom de l'image si mal placé.
          # Ici, on force la commande de démarrage correcte.
          options: server /data

      steps:
        - uses: actions/checkout@v4
        
        - name: Install uv
          uses: astral-sh/setup-uv@v5
          
        - name: Set up Python
          run: uv python install 3.12

        - name: Run tests
          env:
            TESTING: "True"
            PYTHONPATH: "."
            # On utilise 127.0.0.1 pour éviter les problèmes de résolution localhost
            MLFLOW_S3_ENDPOINT_URL: "http://127.0.0.1:9000"
            AWS_ACCESS_KEY_ID: "minioadmin"
            AWS_SECRET_ACCESS_KEY: "minioadmin"
            # On force MLflow en local pour éviter le Connection Refused sur le port 5000
            MLFLOW_TRACKING_URI: "sqlite:///mlflow_test.db"
          run: |
            # On attend que le service soit prêt
            echo "Waiting for MinIO..."
            timeout 20s sh -c 'until curl -s http://127.0.0.1:9000/minio/health/live; do sleep 2; done'
            uv run pytest --cov=fastapi_api --cov=app_front .

  documentation-check:
    name: Documentation Build
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build HTML Documentation
        run: |
          mkdir -p build/html
          uv run sphinx-build -b html docs/source/ build/html