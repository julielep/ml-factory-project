name: CI Quality & Security

on:
  push:
    branches: [ main, dev, master ]
  pull_request:
    branches: [ master ]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-and-lint:
    name: Quality and Tests
    needs: security-scan
    runs-on: ubuntu-latest
    
    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --entrypoint "/bin/sh"

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Set up Python
        run: uv python install 3.12

      - name: Run tests
        env:
          TESTING: "True"
          PYTHONPATH: "."
          MLFLOW_S3_ENDPOINT_URL: "http://127.0.0.1:9000"
          AWS_ACCESS_KEY_ID: "minioadmin"
          AWS_SECRET_ACCESS_KEY: "minioadmin"
          MLFLOW_TRACKING_URI: "sqlite:///mlflow_test.db"
        run: |
          # On force le démarrage du serveur à l'intérieur du conteneur déjà lancé
          docker exec ${{ job.services.minio.id }} minio server /data &
          
          echo "Waiting for MinIO..."
          timeout 30s sh -c 'until curl -s http://127.0.0.1:9000/minio/health/live; do sleep 2; done'
          
          uv run pytest --cov=fastapi_api --cov=app_front .

  documentation-check:
    name: Documentation Build
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: |
          mkdir -p build/html
          uv run sphinx-build -b html docs/source/ build/html